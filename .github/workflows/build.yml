name: Build

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows (MSVC)
            os: windows-latest
          - name: Linux (GCC)
            os: ubuntu-latest
          - name: macOS
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      # Windows and Linux use the prebuilt Qt from aqt. The macOS aqt binaries
      # still reference Apple's removed AGL framework, so the Mac uses Homebrew's
      # Qt instead (built against the current SDK).
      - name: Install Qt 6 (Windows / Linux)
        if: runner.os != 'macOS'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          cache: true

      - name: Install Linux GUI deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libxkbcommon-dev

      - name: Install Qt 6 (macOS, Homebrew)
        if: runner.os == 'macOS'
        run: |
          brew install qt
          echo "CMAKE_PREFIX_PATH=$(brew --prefix qt)" >> "$GITHUB_ENV"

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AudioBitrateGUI-${{ runner.os }}
          path: |
            build/Release/AudioBitrateGUI.exe
            build/AudioBitrateGUI
            build/AudioBitrateGUI.app
          if-no-files-found: ignore
